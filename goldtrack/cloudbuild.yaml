# Cloud Build — GoldTrack Service
# Deploys GoldTrack to Cloud Run as a standalone service
steps:
  - name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        echo "🚀 Deploying GoldTrack to Cloud Run..."

        gcloud run deploy goldtrack \
          --source . \
          --platform managed \
          --region us-central1 \
          --allow-unauthenticated \
          --memory 512Mi \
          --cpu 1 \
          --set-env-vars="NODE_ENV=production,PGHOST=${_PGHOST},PGPORT=${_PGPORT},PGDATABASE=${_PGDATABASE},PGUSER=${_PGUSER},PGPASSWORD=${_PGPASSWORD},PGSSLMODE=require"

        echo "✅ GoldTrack deployed!"
    timeout: "1200s"

substitutions:
  _PGHOST: "34.11.91.3"
  _PGPORT: "5432"
  _PGDATABASE: "postgres"
  _PGUSER: "postgres"
  _PGPASSWORD: ""          # ← Set this in Cloud Build substitutions (do not commit)

options:
  machineType: "E2_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY

timeout: "1800s"
